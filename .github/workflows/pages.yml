name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "IDS_Theory_Public_Edition_EN.pdf"
      - "IDS_Theory_Public_Edition_EN.html"
      - "IDS_Consciousness_Edition_EN.pdf"
      - "IDS_Canonical_Theory_v2_1_0_r2_JA.html"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble curated site
        run: |
          set -e
          mkdir -p _site
          cp site/index.html                          _site/index.html
          cp IDS_Theory_Public_Edition_EN.pdf         _site/IDS_Theory_Public_Edition_EN.pdf
          cp IDS_Theory_Public_Edition_EN.html        _site/public-edition-en.html
          cp IDS_Consciousness_Edition_EN.pdf         _site/IDS_Consciousness_Edition_EN.pdf
          cp IDS_Canonical_Theory_v2_1_0_r2_JA.html   _site/canonical-full-ja.html
          # Prevent Jekyll from touching the static files
          touch _site/.nojekyll
          echo "Assembled site:"; ls -la _site

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Pages already enabled in repo settings (Source: GitHub Actions);
          # no need to attempt creation from the workflow token.
          enablement: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
